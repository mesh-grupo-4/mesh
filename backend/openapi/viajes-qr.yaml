openapi: 3.0.3
info:
  title: Mesh API — Viajes
  version: 2.0.0
  description: |
    Viajes e invitaciones (RN-015 a RN-029).

    - RN-015/016: QR único por viaje; une al viaje directamente.
    - RN-028/029: invitación por grupos con confirmación.

    Autenticación temporal: header `x-user-id`.

servers:
  - url: http://localhost:3000
    description: Desarrollo local

paths:
  /api/viajes:
    post:
      summary: Crear viaje
      operationId: crearViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateViajeRequest'
      responses:
        '201':
          description: Viaje creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViajeCreadoResponse'

  /api/viajes/planificados:
    get:
      summary: Listar viajes planificados del usuario
      operationId: listarViajesPlanificados
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Lista de viajes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ViajePlanificadoItem'

  /api/viajes/invitaciones/pendientes:
    get:
      summary: Invitaciones pendientes a viajes
      operationId: listarInvitacionesViajePendientes
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Invitaciones pendientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvitacionViajePendiente'

  /api/viajes/{viajeId}/invitacion/responder:
    post:
      summary: Aceptar o rechazar invitación al viaje
      operationId: responderInvitacionViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - name: viajeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponderInvitacionViajeRequest'
      responses:
        '200':
          description: Respuesta registrada

  /api/viajes/{viajeId}/participantes:
    get:
      summary: Participantes del viaje (solo creador)
      operationId: listarParticipantesViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - name: viajeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: >-
            Lista de participantes. Cada uno incluye `origen` con el modo de ingreso:
            creador | qr | link | grupo | amigo (amigo = invitado individualmente por amistad).

  /api/viajes/{viajeId}/unirse-qr:
    post:
      summary: Unirse al viaje escaneando QR
      description: RN-015/016. Une al viaje, no modifica membresía de grupos.
      operationId: unirseViajePorQr
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - name: viajeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usuario unido o ya participaba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnirseQrResponse'

  /api/viajes/{viajeId}/ruta:
    get:
      summary: Obtener ruta del viaje
      description: |
        Devuelve origen, destino, geometría y paradas intermedias.
        Solo el creador del viaje puede consultar la ruta completa.
      operationId: obtenerRutaViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - name: viajeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ruta del viaje
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaDetalleResponse'
        '403':
          description: Solo el creador puede ver la ruta (NOT_CREATOR)
        '404':
          description: Viaje o ruta no encontrados (VIAJE_NOT_FOUND / ROUTE_NOT_FOUND)
    put:
      summary: Guardar o actualizar ruta del viaje
      description: |
        Upsert de origen, destino, geometría LineString (GeoJSON) y paradas intermedias.
        Solo el creador del viaje puede configurar la ruta. Reemplaza todas las paradas existentes.
      operationId: guardarRutaViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - name: viajeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutRutaRequest'
      responses:
        '200':
          description: Ruta guardada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaGuardadaResponse'
        '400':
          description: Datos inválidos (validación Zod)
        '403':
          description: Solo el creador puede configurar la ruta (NOT_CREATOR)
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)
        '422':
          description: No se pudo calcular la distancia de la ruta (ROUTE_COMPUTE_FAILED)

components:
  securitySchemes:
    UserIdHeader:
      type: apiKey
      in: header
      name: x-user-id

  parameters:
    XUserId:
      name: x-user-id
      in: header
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateViajeRequest:
      type: object
      required: [nombre, esGrupal, tipoActividad, fechaProgramada]
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
          description: Nombre del viaje. Es el identificador principal mostrado en listas e invitaciones.
        esGrupal:
          type: boolean
        grupoIds:
          type: array
          description: Grupos a invitar en bloque (solo en viajes grupales). Cada miembro recibe invitación pendiente.
          items:
            type: string
            format: uuid
        amigoIds:
          type: array
          description: >-
            Amigos (amistad aceptada) a invitar individualmente (solo en viajes grupales).
            El backend valida que cada id sea amigo del creador (403 NOT_FRIEND si no).
          items:
            type: string
            format: uuid
        tipoActividad:
          type: string
          enum: [moto, bici, running, trekking]
        fechaProgramada:
          type: string
          format: date-time
          description: Debe ser futura (UTC).

    ViajeCreadoResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          nullable: true
        tipo_actividad:
          type: string
          enum: [moto, bici, running, trekking]
        velocidad_esperada:
          type: number
          description: Velocidad máxima esperada en km/h (RN-021, asignada por backend según actividad).
        distancia_max_separacion:
          type: integer
          description: Separación máxima permitida entre integrantes en metros antes de alerta.
        invitaciones_enviadas:
          type: integer
          description: Total de invitaciones pendientes generadas (grupos + amigos, sin duplicar).

    ViajePlanificadoItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          nullable: true
          description: Nombre del viaje (identificador principal). Null en viajes antiguos sin nombre.
        tipo_actividad:
          type: string
          enum: [moto, bici, running, trekking]
        velocidad_esperada:
          type: number
          description: Velocidad máxima esperada en km/h.
        distancia_max_separacion:
          type: integer
          description: Separación máxima permitida entre integrantes en metros.
        fecha_programada:
          type: string
          format: date-time
        mi_estado:
          type: string
          nullable: true

    InvitacionViajePendiente:
      type: object
      properties:
        viaje_id:
          type: string
          format: uuid
        nombre:
          type: string
          nullable: true
          description: Nombre del viaje mostrado en la invitación. Null en viajes antiguos sin nombre.
        tipo_actividad:
          type: string
          enum: [moto, bici, running, trekking]
        fecha_programada:
          type: string
          format: date-time
        creador:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string

    ResponderInvitacionViajeRequest:
      type: object
      required: [accion]
      properties:
        accion:
          type: string
          enum: [aceptar, rechazar]

    UnirseQrResponse:
      type: object
      required: [viajeId, yaEraParticipante]
      properties:
        viajeId:
          type: string
          format: uuid
        yaEraParticipante:
          type: boolean

    GeoJsonPoint:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          description: '[longitud, latitud]'

    GeoJsonLineString:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [LineString]
        coordinates:
          type: array
          minItems: 2
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: number
          description: 'Array de [longitud, latitud]'

    ParadaIntermediaInput:
      type: object
      required: [orden, lat, lng]
      properties:
        orden:
          type: integer
          minimum: 0
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        categoria:
          type: string
          enum: [kiosco, combustible, descanso, gastronomia, punto_control, sanitario, otro]
          default: otro
        nombre:
          type: string
          maxLength: 200
          nullable: true

    PutRutaRequest:
      type: object
      required: [origen, destino, linestring, paradas]
      properties:
        origen:
          $ref: '#/components/schemas/GeoJsonPoint'
        destino:
          $ref: '#/components/schemas/GeoJsonPoint'
        linestring:
          $ref: '#/components/schemas/GeoJsonLineString'
        tiempoEstimadoSeg:
          type: integer
          nullable: true
          description: Tiempo estimado en segundos (opcional, provisto por el cliente)
        origenNombre:
          type: string
          maxLength: 200
          nullable: true
        destinoNombre:
          type: string
          maxLength: 200
          nullable: true
        paradas:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/ParadaIntermediaInput'

    RutaGuardadaResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        viaje_id:
          type: string
          format: uuid
        origen_lat:
          type: number
        origen_lng:
          type: number
        origen_nombre:
          type: string
          nullable: true
        destino_lat:
          type: number
        destino_lng:
          type: number
        destino_nombre:
          type: string
          nullable: true
        linestring_geojson:
          $ref: '#/components/schemas/GeoJsonLineString'
        distancia_planeada_m:
          type: number
          nullable: true
        tiempo_estimado_seg:
          type: integer
          nullable: true

    RutaDetalleResponse:
      type: object
      required: [origen, destino, linestring, paradas]
      properties:
        origen:
          $ref: '#/components/schemas/PuntoRuta'
        destino:
          $ref: '#/components/schemas/PuntoRuta'
        linestring:
          $ref: '#/components/schemas/GeoJsonLineString'
        tiempo_estimado_seg:
          type: integer
          nullable: true
        distancia_planeada_m:
          type: number
          nullable: true
        paradas:
          type: array
          items:
            $ref: '#/components/schemas/ParadaIntermediaDetalle'

    PuntoRuta:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
        lng:
          type: number
        nombre:
          type: string
          nullable: true

    ParadaIntermediaDetalle:
      type: object
      required: [orden, lat, lng, categoria]
      properties:
        orden:
          type: integer
        lat:
          type: number
        lng:
          type: number
        nombre:
          type: string
          nullable: true
        categoria:
          type: string
          enum: [kiosco, combustible, descanso, gastronomia, punto_control, sanitario, otro]
