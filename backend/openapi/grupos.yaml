openapi: 3.0.3
info:
  title: Mesh API — Grupos
  version: 1.0.0
  description: |
    Endpoints de sincronización de usuario y gestión de grupos (SCRUM-11).

    Autenticación en endpoints protegidos: header `Authorization: Bearer <Firebase ID token>`.
    El endpoint `POST /api/usuarios/sync` es público (MVP) hasta integrar Firebase Auth en backend.

servers:
  - url: http://localhost:3000
    description: Desarrollo local

paths:
  /api/usuarios/sync:
    post:
      summary: Sincronizar usuario Firebase con PostgreSQL
      description: |
        Upsert por email. Devuelve el UUID backend usado como `x-user-id`.
        **Deuda técnica:** sin verificación de token Firebase.
      operationId: syncUsuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncUsuarioRequest'
      responses:
        '200':
          description: Usuario sincronizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncUsuarioResponse'
        '400':
          description: Validación fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/grupos:
    post:
      summary: Crear grupo
      description: |
        Crea un grupo y asigna al creador como líder (RN-010).
        También crea fila en `grupo_miembro` con rol `lider`.
      operationId: crearGrupo
      tags:
        - Grupos
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Grupo creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrupoResponse'
        '400':
          description: Validación fallida (ej. nombre vacío)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Token ausente, inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/grupos/{grupoId}:
    get:
      summary: Detalle de grupo
      description: Solo accesible para miembros del grupo.
      operationId: obtenerGrupo
      tags:
        - Grupos
      security:
        - BearerAuth: []
      parameters:
        - name: grupoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalle del grupo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrupoDetalleResponse'
        '401':
          description: Token ausente, inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuario no es miembro del grupo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Grupo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Eliminar grupo
      description: |
        Elimina el grupo por completo (SCRUM-16). Solo el líder actual.
        Borra viajes planificados asociados; bloquea si hay un viaje en curso.
      operationId: eliminarGrupo
      tags:
        - Grupos
      security:
        - BearerAuth: []
      parameters:
        - name: grupoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Grupo eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrupoMutationResponse'
        '403':
          description: Solo el líder puede eliminar el grupo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Grupo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Hay un viaje en curso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/grupos/{grupoId}/abandonar:
    post:
      summary: Abandonar grupo
      description: |
        Remueve al usuario autenticado del grupo (SCRUM-16).
        Si es participante, sale directamente.
        Si es líder único, elimina el grupo.
        Si es líder con otros miembros, requiere `nuevo_lider_id` para transferir liderazgo.
      operationId: abandonarGrupo
      tags:
        - Grupos
      security:
        - BearerAuth: []
      parameters:
        - name: grupoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbandonarGrupoRequest'
      responses:
        '200':
          description: Abandono o eliminación exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrupoMutationResponse'
        '400':
          description: Líder debe transferir liderazgo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuario no es miembro del grupo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Grupo o integrante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Hay un viaje en curso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/grupos/{grupoId}/miembros:
    get:
      summary: Listar miembros del grupo
      description: |
        Devuelve todos los integrantes con nombre, email y rol (SCRUM-15).
        Solo accesible para miembros del grupo.
      operationId: listarMiembrosGrupo
      tags:
        - Grupos
      security:
        - BearerAuth: []
      parameters:
        - name: grupoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de miembros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GrupoMiembroResponse'
        '401':
          description: Token ausente, inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuario no es miembro del grupo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Grupo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/grupos/{grupoId}/miembros/{usuarioId}/rol:
    patch:
      summary: Cambiar rol de un integrante
      description: |
        Solo el líder actual puede cambiar roles (RN-012, RN-030).
        Promover a `lider` transfiere el liderazgo único del grupo.
      operationId: cambiarRolMiembroGrupo
      tags:
        - Grupos
      security:
        - BearerAuth: []
      parameters:
        - name: grupoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: usuarioId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarRolMiembroRequest'
      responses:
        '200':
          description: Rol actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CambiarRolMiembroResponse'
        '400':
          description: Validación fallida o operación no permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token ausente, inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Solo el líder puede cambiar roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Grupo o integrante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase ID token

  parameters:
    XUserId:
      name: x-user-id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      deprecated: true
      description: Reemplazado por BearerAuth

  schemas:
    SyncUsuarioRequest:
      type: object
      required:
        - email
        - nombre
      properties:
        email:
          type: string
          format: email
        nombre:
          type: string
          minLength: 1

    SyncUsuarioResponse:
      type: object
      required:
        - id
        - email
        - nombre
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nombre:
          type: string

    CreateGrupoRequest:
      type: object
      required:
        - nombre
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 80
          description: Nombre del grupo (obligatorio)

    GrupoResponse:
      type: object
      required:
        - id
        - nombre
        - fecha_creacion
        - lider_id
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
        fecha_creacion:
          type: string
          format: date-time
        lider_id:
          type: string
          format: uuid

    GrupoDetalleResponse:
      allOf:
        - $ref: '#/components/schemas/GrupoResponse'
        - type: object
          required:
            - mi_rol
          properties:
            mi_rol:
              type: string
              enum:
                - lider
                - participante

    GrupoMiembroResponse:
      type: object
      required:
        - id
        - nombre
        - email
        - rol
        - fecha_union
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
        email:
          type: string
          format: email
        rol:
          type: string
          enum:
            - lider
            - participante
        fecha_union:
          type: string
          format: date-time

    CambiarRolMiembroRequest:
      type: object
      required:
        - rol
      properties:
        rol:
          type: string
          enum:
            - lider
            - participante

    CambiarRolMiembroResponse:
      type: object
      required:
        - usuario_id
        - rol
      properties:
        usuario_id:
          type: string
          format: uuid
        rol:
          type: string
          enum:
            - lider
            - participante

    AbandonarGrupoRequest:
      type: object
      properties:
        nuevo_lider_id:
          type: string
          format: uuid
          description: Requerido si el líder abandona y hay otros miembros

    GrupoMutationResponse:
      type: object
      required:
        - accion
      properties:
        accion:
          type: string
          enum:
            - abandonado
            - grupo_eliminado
        grupo_id:
          type: string
          format: uuid

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    ValidationError:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
