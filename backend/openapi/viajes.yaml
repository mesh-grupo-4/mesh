openapi: 3.0.3
info:
  title: Mesh API — Viajes
  version: 3.0.0
  description: |
    Ciclo de vida completo de viajes: creación, invitaciones, configuración de ruta,
    tracking GPS y transiciones de estado (RN-015 a RN-038).

    - RN-015/016: QR único por viaje; une al viaje directamente.
    - RN-021: la actividad define velocidad esperada y separación máxima (asignadas por backend).
    - RN-028/029: invitación por grupos y amigos con confirmación.
    - RN-030: solo el creador (líder) puede mutar estado, ruta y reprogramar el viaje.
    - RN-031/038: ingreso de posiciones GPS (live y offline_sync) sin pérdida de registros.

    Estados del viaje: planificado → en_curso → finalizado (solo el líder transiciona).

    Autenticación temporal: header `x-user-id`.

servers:
  - url: http://localhost:3000
    description: Desarrollo local

paths:
  /api/viajes:
    post:
      summary: Crear viaje
      operationId: crearViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateViajeRequest'
      responses:
        '201':
          description: Viaje creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViajeCreadoResponse'
        '400':
          description: Datos inválidos o fecha no futura (FECHA_PASADA)
        '403':
          description: No sos miembro del grupo o no son amigos (NOT_GROUP_MEMBER / NOT_FRIEND)
        '404':
          description: Usuario no encontrado (USER_NOT_FOUND)

  /api/viajes/planificados:
    get:
      summary: Listar viajes planificados del usuario
      operationId: listarViajesPlanificados
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Lista de viajes (creados por el usuario o donde participa/está invitado)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ViajePlanificadoItem'

  /api/viajes/invitaciones/pendientes:
    get:
      summary: Invitaciones pendientes a viajes
      operationId: listarInvitacionesViajePendientes
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Invitaciones pendientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvitacionViajePendiente'

  /api/viajes/{viajeId}/unirse-qr:
    post:
      summary: Unirse al viaje escaneando QR
      description: RN-015/016. Une al viaje, no modifica membresía de grupos.
      operationId: unirseViajePorQr
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      responses:
        '200':
          description: Usuario unido o ya participaba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnirseQrResponse'
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)
        '410':
          description: El QR expiró porque el viaje ya no está planificado (QR_EXPIRED)

  /api/viajes/{viajeId}/invitacion/responder:
    post:
      summary: Aceptar o rechazar invitación al viaje
      operationId: responderInvitacionViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponderInvitacionViajeRequest'
      responses:
        '200':
          description: Respuesta registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponderInvitacionViajeResponse'
        '404':
          description: Invitación no encontrada (INVITATION_NOT_FOUND)
        '409':
          description: La invitación ya fue respondida (INVITATION_ALREADY_ANSWERED)
        '410':
          description: El viaje ya no acepta respuestas (TRIP_NOT_PLANNED)

  /api/viajes/{viajeId}/participantes:
    get:
      summary: Participantes del viaje
      operationId: listarParticipantesViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      responses:
        '200':
          description: >-
            Lista de participantes. Accesible para el creador y cualquier integrante no rechazado.
            Cada uno incluye `origen` con el modo de ingreso:
            creador | qr | link | grupo | amigo (amigo = invitado individualmente por amistad).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParticipanteViaje'
        '403':
          description: Sin acceso a este viaje (FORBIDDEN)
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)

  /api/viajes/{viajeId}:
    get:
      summary: Detalle del viaje
      description: |
        Devuelve el viaje con su creador, referencia a la ruta y la participación del
        usuario que consulta. Accesible para el creador y los integrantes no rechazados.
      operationId: obtenerViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      responses:
        '200':
          description: Detalle del viaje
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViajeDetalleResponse'
        '403':
          description: Sin acceso a este viaje (FORBIDDEN)
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)
    patch:
      summary: Reprogramar viaje (solo creador)
      description: |
        RN-030. Permite al líder cambiar la fecha y hora programada mientras el viaje
        sigue `planificado`. La fecha debe ser futura (UTC).
      operationId: actualizarViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualizarViajeRequest'
      responses:
        '200':
          description: Viaje actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizarViajeResponse'
        '400':
          description: La fecha programada debe ser futura (FECHA_PASADA)
        '403':
          description: Solo el creador puede modificar el viaje (NOT_CREATOR)
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)
        '409':
          description: Solo se puede editar un viaje planificado (INVALID_STATE)

  /api/viajes/{viajeId}/posiciones:
    post:
      summary: Ingresar posiciones GPS (live y offline_sync)
      description: |
        RN-031/RN-038. Ingreso masivo de registros GPS sin pérdida. Con `source: live`
        emite la última posición por WebSocket (`viaje:ubicacion`). El viaje debe estar
        `en_curso` y el usuario debe ser creador o integrante confirmado.
      operationId: ingresarPosicionesViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostPosicionesRequest'
      responses:
        '201':
          description: Posiciones insertadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPosicionesResponse'
        '400':
          description: Datos inválidos (validación Zod)
        '403':
          description: Sin acceso a este viaje (FORBIDDEN)
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)
        '409':
          description: El viaje no admite envío de GPS en este estado (INVALID_STATE)

  /api/viajes/{viajeId}/ruta:
    get:
      summary: Obtener ruta del viaje
      description: |
        Devuelve origen, destino, geometría y paradas intermedias.
        Accesible para el creador y cualquier integrante no rechazado del viaje.
      operationId: obtenerRutaViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      responses:
        '200':
          description: Ruta del viaje
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaDetalleResponse'
        '403':
          description: Sin acceso a este viaje (FORBIDDEN)
        '404':
          description: Viaje o ruta no encontrados (VIAJE_NOT_FOUND / ROUTE_NOT_FOUND)
    put:
      summary: Guardar o actualizar ruta del viaje
      description: |
        Upsert de origen, destino, geometría LineString (GeoJSON) y paradas intermedias.
        Solo el creador del viaje puede configurar la ruta. Reemplaza todas las paradas existentes.
      operationId: guardarRutaViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutRutaRequest'
      responses:
        '200':
          description: Ruta guardada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaGuardadaResponse'
        '400':
          description: Datos inválidos (validación Zod)
        '403':
          description: Solo el creador puede configurar la ruta (NOT_CREATOR)
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)
        '422':
          description: No se pudo calcular la distancia de la ruta (ROUTE_COMPUTE_FAILED)

  /api/viajes/{viajeId}/iniciar:
    post:
      summary: Iniciar viaje (solo creador)
      description: |
        RN-030. Transiciona planificado → en_curso, fija `fecha_inicio_real` y emite
        `viaje:iniciado` por WebSocket. Solo el creador puede iniciarlo.
      operationId: iniciarViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      responses:
        '200':
          description: Viaje en curso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViajeResponse'
        '403':
          description: Solo el creador puede iniciar el viaje (NOT_CREATOR)
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)
        '409':
          description: El viaje no está en estado planificado (INVALID_STATE)

  /api/viajes/{viajeId}/finalizar:
    post:
      summary: Finalizar viaje (solo creador)
      description: |
        RN-030. Transiciona en_curso → finalizado, fija `fecha_fin_real` y genera el
        resumen del viaje. Emite `viaje:finalizado` por WebSocket. Solo el creador puede finalizarlo.
      operationId: finalizarViaje
      tags: [Viajes]
      security: [{ UserIdHeader: [] }]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/ViajeId'
      responses:
        '200':
          description: Viaje finalizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViajeResponse'
        '403':
          description: Solo el creador puede finalizar el viaje (NOT_CREATOR)
        '404':
          description: Viaje no encontrado (VIAJE_NOT_FOUND)
        '409':
          description: El viaje no está en curso (INVALID_STATE)

components:
  securitySchemes:
    UserIdHeader:
      type: apiKey
      in: header
      name: x-user-id

  parameters:
    XUserId:
      name: x-user-id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    ViajeId:
      name: viajeId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateViajeRequest:
      type: object
      required: [nombre, esGrupal, tipoActividad, fechaProgramada]
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
          description: Nombre del viaje. Es el identificador principal mostrado en listas e invitaciones.
        esGrupal:
          type: boolean
        grupoIds:
          type: array
          description: Grupos a invitar en bloque (solo en viajes grupales). Cada miembro recibe invitación pendiente.
          items:
            type: string
            format: uuid
        amigoIds:
          type: array
          description: >-
            Amigos (amistad aceptada) a invitar individualmente (solo en viajes grupales).
            El backend valida que cada id sea amigo del creador (403 NOT_FRIEND si no).
          items:
            type: string
            format: uuid
        tipoActividad:
          type: string
          enum: [moto, bici, running, trekking]
        fechaProgramada:
          type: string
          format: date-time
          description: Debe ser futura (UTC).

    ViajeCreadoResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          nullable: true
        creador_id:
          type: string
          format: uuid
        es_grupal:
          type: boolean
        tipo_actividad:
          type: string
          enum: [moto, bici, running, trekking]
        velocidad_esperada:
          type: number
          description: Velocidad máxima esperada en km/h (RN-021, asignada por backend según actividad).
        distancia_max_separacion:
          type: integer
          description: Separación máxima permitida entre integrantes en metros antes de alerta.
        estado:
          type: string
          enum: [planificado, en_curso, finalizado]
        fecha_programada:
          type: string
          format: date-time
        invitaciones_enviadas:
          type: integer
          description: Total de invitaciones pendientes generadas (grupos + amigos, sin duplicar).

    ViajePlanificadoItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        creador_id:
          type: string
          format: uuid
        nombre:
          type: string
          nullable: true
          description: Nombre del viaje (identificador principal). Null en viajes antiguos sin nombre.
        es_grupal:
          type: boolean
        tipo_actividad:
          type: string
          enum: [moto, bici, running, trekking]
        velocidad_esperada:
          type: number
          description: Velocidad máxima esperada en km/h.
        distancia_max_separacion:
          type: integer
          description: Separación máxima permitida entre integrantes en metros.
        fecha_programada:
          type: string
          format: date-time
        estado:
          type: string
          enum: [planificado, en_curso, finalizado]
        mi_estado:
          type: string
          nullable: true
          description: 'creador para el líder; si no, el estado del integrante: confirmado | pendiente | rechazado | null.'

    InvitacionViajePendiente:
      type: object
      properties:
        viaje_id:
          type: string
          format: uuid
        nombre:
          type: string
          nullable: true
          description: Nombre del viaje mostrado en la invitación. Null en viajes antiguos sin nombre.
        tipo_actividad:
          type: string
          enum: [moto, bici, running, trekking]
        fecha_programada:
          type: string
          format: date-time
        creador:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        created_at:
          type: string
          format: date-time

    ResponderInvitacionViajeRequest:
      type: object
      required: [accion]
      properties:
        accion:
          type: string
          enum: [aceptar, rechazar]

    ResponderInvitacionViajeResponse:
      type: object
      properties:
        viaje_id:
          type: string
          format: uuid
        accion:
          type: string
          enum: [aceptar, rechazar]
        tipo_actividad:
          type: string
          enum: [moto, bici, running, trekking]
        fecha_programada:
          type: string
          format: date-time

    ParticipanteViaje:
      type: object
      properties:
        usuario:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            email:
              type: string
              format: email
        estado:
          type: string
          enum: [pendiente, confirmado, rechazado]
        origen:
          type: string
          enum: [creador, qr, link, grupo, amigo]
        created_at:
          type: string
          format: date-time

    UnirseQrResponse:
      type: object
      required: [viajeId, yaEraParticipante]
      properties:
        viajeId:
          type: string
          format: uuid
        yaEraParticipante:
          type: boolean

    ViajeResponse:
      type: object
      description: Fila completa del viaje (devuelta por iniciar y finalizar).
      properties:
        id:
          type: string
          format: uuid
        creador_id:
          type: string
          format: uuid
        nombre:
          type: string
          nullable: true
        es_grupal:
          type: boolean
        tipo_actividad:
          type: string
          enum: [moto, bici, running, trekking]
        velocidad_esperada:
          type: number
        distancia_max_separacion:
          type: integer
        estado:
          type: string
          enum: [planificado, en_curso, finalizado]
        fecha_programada:
          type: string
          format: date-time
        fecha_inicio_real:
          type: string
          format: date-time
          nullable: true
        fecha_fin_real:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ViajeDetalleResponse:
      allOf:
        - $ref: '#/components/schemas/ViajeResponse'
        - type: object
          properties:
            creador:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                nombre:
                  type: string
                email:
                  type: string
                  format: email
            ruta:
              nullable: true
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                distancia_planeada_m:
                  type: number
                  nullable: true
            mi_participacion:
              nullable: true
              type: object
              properties:
                estado:
                  type: string
                  enum: [pendiente, confirmado, rechazado]
                origen:
                  type: string
                  enum: [creador, qr, link, grupo, amigo]

    ActualizarViajeRequest:
      type: object
      required: [fechaProgramada]
      properties:
        fechaProgramada:
          type: string
          format: date-time
          description: Nueva fecha y hora programada. Debe ser futura (UTC).

    ActualizarViajeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fecha_programada:
          type: string
          format: date-time
        estado:
          type: string
          enum: [planificado, en_curso, finalizado]

    PosicionInput:
      type: object
      required: [lat, lng, timestamp]
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        precision:
          type: number
          nullable: true
          description: Precisión en metros (opcional).
        timestamp:
          type: string
          format: date-time
          description: Momento de captura del registro (preserva la secuencia temporal en offline_sync).

    PostPosicionesRequest:
      type: object
      required: [source, posiciones]
      properties:
        source:
          type: string
          enum: [live, offline_sync]
          description: 'live: ping en tiempo real; offline_sync: lote almacenado localmente y sincronizado al reconectar (RN-038).'
        posiciones:
          type: array
          minItems: 1
          maxItems: 2000
          items:
            $ref: '#/components/schemas/PosicionInput'

    PostPosicionesResponse:
      type: object
      properties:
        insertados:
          type: integer
          description: Cantidad de registros GPS persistidos.

    GeoJsonPoint:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          description: '[longitud, latitud]'

    GeoJsonLineString:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [LineString]
        coordinates:
          type: array
          minItems: 2
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: number
          description: 'Array de [longitud, latitud]'

    ParadaIntermediaInput:
      type: object
      required: [orden, lat, lng]
      properties:
        orden:
          type: integer
          minimum: 0
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        categoria:
          type: string
          enum: [kiosco, combustible, descanso, gastronomia, punto_control, sanitario, otro]
          default: otro
        nombre:
          type: string
          maxLength: 200
          nullable: true

    PutRutaRequest:
      type: object
      required: [origen, destino, linestring, paradas]
      properties:
        origen:
          $ref: '#/components/schemas/GeoJsonPoint'
        destino:
          $ref: '#/components/schemas/GeoJsonPoint'
        linestring:
          $ref: '#/components/schemas/GeoJsonLineString'
        tiempoEstimadoSeg:
          type: integer
          nullable: true
          description: Tiempo estimado en segundos (opcional, provisto por el cliente)
        origenNombre:
          type: string
          maxLength: 200
          nullable: true
        destinoNombre:
          type: string
          maxLength: 200
          nullable: true
        paradas:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/ParadaIntermediaInput'

    RutaGuardadaResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        viaje_id:
          type: string
          format: uuid
        origen_lat:
          type: number
        origen_lng:
          type: number
        origen_nombre:
          type: string
          nullable: true
        destino_lat:
          type: number
        destino_lng:
          type: number
        destino_nombre:
          type: string
          nullable: true
        linestring_geojson:
          $ref: '#/components/schemas/GeoJsonLineString'
        distancia_planeada_m:
          type: number
          nullable: true
        tiempo_estimado_seg:
          type: integer
          nullable: true

    RutaDetalleResponse:
      type: object
      required: [origen, destino, linestring, paradas]
      properties:
        origen:
          $ref: '#/components/schemas/PuntoRuta'
        destino:
          $ref: '#/components/schemas/PuntoRuta'
        linestring:
          $ref: '#/components/schemas/GeoJsonLineString'
        tiempo_estimado_seg:
          type: integer
          nullable: true
        distancia_planeada_m:
          type: number
          nullable: true
        paradas:
          type: array
          items:
            $ref: '#/components/schemas/ParadaIntermediaDetalle'

    PuntoRuta:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
        lng:
          type: number
